        let result = text;

        terms.forEach((term) => {
          const regex = new RegExp(`(${escapeRegex(term)})`, "gi");
          result = result.replace(regex, "<mark>$1</mark>");
        });

        return result;
      }

      function escapeRegex(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function performSearch(query) {
        if (!query.trim()) {
          document.getElementById("minisearchResults").innerHTML =
            '<div class="no-results">Enter a search query</div>';
          document.getElementById("flexsearchResults").innerHTML =
            '<div class="no-results">Enter a search query</div>';
          document.getElementById("stats").textContent =
            `Total documents: ${documents.length}`;
          document.getElementById("minisearchTiming").textContent = "";
          document.getElementById("flexsearchTiming").textContent = "";
          return;
        }

        // MiniSearch
        const miniStart = performance.now();
        const miniResults = miniSearch.search(query);
        const miniEnd = performance.now();

        console.log(miniResults);

        // FlexSearch
        const flexStart = performance.now();
        const flexRawResults = flexSearch.search(query, {
          highlight: "<match>$1</match>",
        });
        const flexEnd = performance.now();

        console.log(flexRawResults);

        // Process FlexSearch results
        const flexResults = [];
        const seenIds = new Set();

        flexRawResults.forEach((fieldResult) => {
          if (fieldResult.result) {
            fieldResult.result.forEach((item) => {
              const itemId = typeof item === "number" ? item : item.id;
              if (!seenIds.has(itemId)) {
                seenIds.add(itemId);
                const doc = documents.find((d) => d.id === itemId);
                if (doc) {
                  flexResults.push({
                    id: itemId,
                    ...doc,
                    score: 1, // FlexSearch doesn't provide scores in the same way
                  });
                }
              }
            });
          }
        });

        // Update stats
        document.getElementById("stats").textContent =
          `Total documents: ${documents.length} | Query: "${query}"`;

        document.getElementById("minisearchTiming").textContent =
          `Search time: ${(miniEnd - miniStart).toFixed(2)}ms | Results: ${miniResults.length}`;

        document.getElementById("flexsearchTiming").textContent =
          `Search time: ${(flexEnd - flexStart).toFixed(2)}ms | Results: ${flexResults.length}`;

        // Render MiniSearch results
        const miniHtml =
          miniResults.length > 0
            ? miniResults
                .map(
                  (result) => `
                    <div class="result-item minisearch">
                        <div class="result-id">ID: ${result.id} | Lang: ${result.language}</div>
                        <div class="result-title">${highlightText(result.title, result.terms)}</div>
                        <div class="result-content">${highlightText(result.content.substring(0, 200) + "...", result.terms)}</div>
                        <div class="result-score">Score: ${result.score.toFixed(4)}</div>
                    </div>
                `,
                )
                .join("")
            : '<div class="no-results">No results found</div>';

        document.getElementById("minisearchResults").innerHTML = miniHtml;

        // Render FlexSearch results
        const flexHtml =
          flexResults.length > 0
            ? flexResults
                .slice(0, 20)
                .map(
                  (result) => `
                    <div class="result-item flexsearch">
                        <div class="result-id">ID: ${result.id} | Lang: ${result.language}</div>
                        <div class="result-title">${highlightText(result.title, [query])}</div>
                        <div class="result-content">${highlightText(result.content.substring(0, 200) + "...", [query])}</div>
                    </div>
                `,
                )
                .join("")
            : '<div class="no-results">No results found</div>';

        document.getElementById("flexsearchResults").innerHTML = flexHtml;
      }

      // Event listener
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", (e) => {
        performSearch(e.target.value);
      });

      // Initial state
      performSearch("");
    </script>
  </body>
</html>
